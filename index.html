<style>
:root{--yel:#F2D64B;--yel2:#d9ba2e;--ink:#f4f2ec;--ink2:#b8b4a8;--ink3:#7a776d}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
 background:radial-gradient(1100px 640px at 50% 28%,#181818 0%,#090909 72%);color:var(--ink);
 font-family:Inter,"Segoe UI",system-ui,sans-serif;text-align:center;padding:24px}
.logo{font-family:Didot,"Bodoni MT","Playfair Display",Georgia,serif;font-weight:300;font-size:56px;
 letter-spacing:14px;color:var(--ink);display:flex;align-items:center;gap:2px;justify-content:center}
.logo .bar{display:inline-block;width:1.5px;height:64px;background:var(--ink);margin:0 10px 0 4px}
.tag{letter-spacing:8px;color:var(--yel);font-size:12px;text-transform:uppercase;margin-top:10px;font-weight:600}
h2{font-size:17px;color:var(--ink2);font-weight:400;margin-top:6px}
.pill{border:1px solid #26261f;border-radius:99px;padding:7px 16px;color:var(--ink2);font-size:12.5px}
.gate{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center}
input{background:#1a1a17;border:1px solid #2c2c24;color:var(--ink);border-radius:10px;padding:13px 16px;
 font-size:16px;letter-spacing:3px;text-transform:uppercase;text-align:center;width:220px;outline:none}
input:focus{border-color:var(--yel)}
button{background:linear-gradient(135deg,#c8ab26,#f4dd6b);color:#141203;border:0;border-radius:10px;
 padding:13px 34px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;
 box-shadow:0 8px 28px rgba(242,214,75,.22)}
button:hover{transform:translateY(-1px)}
button:disabled{opacity:.6;cursor:wait;transform:none}
#err{color:#ef8b88;font-size:13px;min-height:18px}
footer{position:fixed;bottom:26px;color:var(--ink3);font-size:12px;letter-spacing:1px}
footer b{color:var(--ink2)}
@keyframes shake{20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.shake{animation:shake .4s}
@media(max-width:480px){.logo{font-size:42px;letter-spacing:10px}.logo .bar{height:48px}}
</style>

<script>
"use strict";
const V = JSON.parse(document.getElementById('vault').textContent);
const un64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function open(){
  const code = document.getElementById('code').value.trim().toUpperCase();
  const btn = document.getElementById('go'), err = document.getElementById('err');
  if(!code){ err.textContent='Informe o código de acesso.'; return; }
  btn.disabled = true; btn.textContent = 'Abrindo…'; err.textContent='';
  try{
    const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(code), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:un64(V.salt), iterations:V.iter, hash:'SHA-256'},
      base, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:un64(V.iv)}, key, un64(V.ct));
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  }catch(e){
    btn.disabled = false; btn.textContent = 'Acessar';
    err.textContent = 'Código incorreto — tente novamente.';
    const inp = document.getElementById('code');
    inp.classList.add('shake'); setTimeout(()=>inp.classList.remove('shake'), 450);
  }
}
document.getElementById('go').addEventListener('click', open);
document.getElementById('code').addEventListener('keydown', e=>{ if(e.key==='Enter') open(); });
document.getElementById('code').focus();
/* chave no fragmento do link (#k=...) — nunca é enviada ao servidor */
const mk = location.hash.match(/k=([A-Za-z0-9-]+)/);
if(mk){ document.getElementById('code').value = mk[1]; open(); }
</script>
